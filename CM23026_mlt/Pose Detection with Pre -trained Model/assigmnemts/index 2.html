<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Detection Assignment - Visualize Skeleton</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a2e; color: #fff; padding: 20px; }
        #container { position: relative; margin: 20px auto; display: inline-block; }
        #video { width: 640px; height: 480px; border-radius: 10px; }
        #canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; pointer-events: none; }
        button { background: #0f3460; color: white; padding: 12px 24px; border: none; border-radius: 5px; margin: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #16213e; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin: 20px 0; font-size: 18px; font-weight: bold; }
        h1 { color: #e94560; }
    </style>
</head>
<body>
    <h1>📸 Human Pose Detection & Skeleton Visualization</h1>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <button id="startBtn">Start Pose Detection</button>
    <button id="stopBtn" disabled>Stop</button>
    <div id="status">Click Start to begin detecting poses</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let net, isDetecting = false, stream;

        canvas.width = 640;
        canvas.height = 480;

        async function setup() {
            status.textContent = 'Loading PoseNet model...';
            net = await posenet.load({
                architecture: 'MobileNetV1',
                outputStride: 16,
                inputResolution: 513,
                multiplier: 0.5
            });
            status.textContent = 'Model loaded! Click Start.';
            
            document.getElementById('startBtn').onclick = startDetection;
            document.getElementById('stopBtn').onclick = stopDetection;
        }

        async function startDetection() {
            try {
                status.textContent = 'Accessing webcam...';
                stream = await navigator.mediaDevices.getUserMedia({video: true});
                video.srcObject = stream;
                await video.play();
                
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                isDetecting = true;
                status.textContent = 'Detecting poses in real-time...';
                detectPose();
            } catch (e) {
                status.textContent = 'Webcam access denied';
            }
        }

        function stopDetection() {
            isDetecting = false;
            if (stream) stream.getTracks()[0].stop();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            status.textContent = 'Stopped';
        }

        async function detectPose() {
            if (!isDetecting) return;
            
            const pose = await net.estimateSinglePose(video, {flipHorizontal: false});
            drawResults(pose);
            requestAnimationFrame(detectPose);
        }

        function drawResults(pose) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Keypoints
            pose.keypoints.forEach(point => {
                if (point.score > 0.5) {
                    const {x, y} = point.position;
                    ctx.beginPath();
                    ctx.arc(x, y, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ff4444';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
            
            // Skeleton connections
            const keypointConnections = [
                [5,6], [5,7], [5,11], [6,8], [6,12], [7,9], [11,12], [11,13], 
                [13,15], [12,14], [14,16], [0,1], [0,2], [1,3], [2,4]
            ];
            
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            keypointConnections.forEach(([i1, i2]) => {
                const p1 = pose.keypoints[i1];
                const p2 = pose.keypoints[i2];
                if (p1.score > 0.5 && p2.score > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(p1.position.x, p1.position.y);
                    ctx.lineTo(p2.position.x, p2.position.y);
                    ctx.strokeStyle = '#44ff44';
                    ctx.stroke();
                }
            });
        }

        setup();
    </script>
</body>
</html>
