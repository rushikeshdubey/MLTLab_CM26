<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕺 PoseNet Pose Detection - Real-time Human Pose</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            50% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 5px #fff); }
            to { filter: drop-shadow(0 0 20px #ff6b6b); }
        }

        #container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 90vw;
            max-height: 90vh;
        }

        #videoContainer {
            position: relative;
            width: clamp(320px, 70vw, 800px);
            height: clamp(240px, 52.5vw, 600px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            pointer-events: none;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: clamp(14px, 2vw, 18px);
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        #status {
            font-size: clamp(16px, 3vw, 24px);
            font-weight: 700;
            margin-bottom: 20px;
            min-height: 30px;
            text-shadow: 0 0 10px currentColor;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .confidence-bar {
            width: 100px;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ffa502, #2ed573);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        #info {
            text-align: center;
            max-width: 640px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .controls { flex-direction: column; align-items: center; }
            button { width: 200px; }
        }

        .fps-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: lime;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🕺 AI Pose Detection</h1>
        <p>Real-time human pose estimation with TensorFlow PoseNet</p>
    </div>

    <div id="container">
        <div id="videoContainer">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
            <div class="fps-counter" id="fps">0 FPS</div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-primary">🎥 Start Detection</button>
            <button id="stopBtn" class="btn-secondary" disabled>⏹️ Stop</button>
            <button id="fullScreenBtn" class="btn-secondary">📱 Fullscreen</button>
        </div>

        <div id="status">🚀 Ready to detect poses!</div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat">
                Pose Confidence
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                </div>
                <span id="confidenceText">0%</span>
            </div>
            <div class="stat">
                Keypoints<br>
                <span id="keypointCount">0</span>/17
            </div>
        </div>

        <div id="info">
            <strong>💡 How to use:</strong> Click Start → Allow camera → Strike a pose!<br>
            PoseNet detects 17 body joints in real-time. Best in good lighting.
        </div>
    </div>

    <!-- TensorFlow.js core -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.1/dist/tf.min.js"></script>
    <!-- PoseNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>

    <script>
        class PoseDetector {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.net = null;
                this.isDetecting = false;
                this.animationId = null;
                this.stream = null;
                this.lastTimestamp = 0;
                this.fps = 0;
                this.init();
            }

            async init() {
                // Setup canvas
                const resizeObserver = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const { width, height } = entry.contentRect;
                        this.canvas.width = width;
                        this.canvas.height = height;
                    }
                });
                resizeObserver.observe(document.getElementById('videoContainer'));

                // Load model
                try {
                    document.getElementById('status').textContent = '🧠 Loading PoseNet...';
                    this.net = await posenet.load({
                        architecture: 'MobileNetV1',
                        outputStride: 16,
                        inputResolution: { width: 513, height: 513 },
                        multiplier: 0.75,
                        quantBytes: 2
                    });
                    document.getElementById('status').textContent = '✅ Model ready! Click Start Detection';
                } catch (error) {
                    console.error('Model load error:', error);
                    document.getElementById('status').textContent = '❌ Model failed to load';
                }

                // Event listeners
                document.getElementById('startBtn').onclick = () => this.start();
                document.getElementById('stopBtn').onclick = () => this.stop();
                document.getElementById('fullScreenBtn').onclick = () => this.toggleFullscreen();

                // FPS calculation
                setInterval(() => {
                    document.getElementById('fps').textContent = `${Math.round(this.fps)} FPS`;
                }, 1000);
            }

            async start() {
                try {
                    document.getElementById('status').textContent = '📹 Starting camera...';
                    
                    this.stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: 'user'
                        }
                    });
                    
                    this.video.srcObject = this.stream;
                    await new Promise(resolve => {
                        this.video.onloadedmetadata = () => resolve();
                    });
                    
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('fullScreenBtn').disabled = false;
                    document.getElementById('stats').style.display = 'flex';
                    
                    this.isDetecting = true;
                    document.getElementById('status').textContent = '🎯 Detecting poses...';
                    this.detectLoop();
                } catch (error) {
                    console.error('Camera error:', error);
                    document.getElementById('status').textContent = `❌ Camera error: ${error.message}`;
                }
            }

            stop() {
                this.isDetecting = false;
                if (this.animationId) cancelAnimationFrame(this.animationId);
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                    this.stream = null;
                }
                this.video.srcObject = null;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('fullScreenBtn').disabled = true;
                document.getElementById('stats').style.display = 'none';
                document.getElementById('status').textContent = '⏸️ Stopped';
            }

            async detectLoop() {
                if (!this.isDetecting || !this.net) return;

                const timestamp = performance.now();
                this.fps = 1000 / (timestamp - this.lastTimestamp);
                this.lastTimestamp = timestamp;

                try {
                    const pose = await this.net.estimateSinglePose(this.video, {
                        flipHorizontal: true
                    });

                    this.drawPose(pose);
                    this.updateStats(pose);

                } catch (error) {
                    console.error('Detection error:', error);
                }

                this.animationId = requestAnimationFrame(() => this.detectLoop());
            }

            drawPose(pose) {
                this.ctx.save();
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw keypoints with neon glow
                pose.keypoints.forEach(keypoint => {
                    if (keypoint.score > 0.3) {
                        const pos = this.scaleToCanvas(keypoint.position);
                        
                        // Glow effect
                        const gradient = this.ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 15);
                        gradient.addColorStop(0, `rgba(0,255,255,${keypoint.score})`);
                        gradient.addColorStop(0.6, `rgba(0,255,255,${keypoint.score * 0.3})`);
                        gradient.addColorStop(1, 'rgba(0,255,255,0)');
                        
                        this.ctx.fillStyle = gradient;
                        this.ctx.beginPath();
                        this.ctx.arc(pos.x, pos.y, 12, 0, Math.PI * 2);
                        this.ctx.fill();
                        
                        // Core dot
                        this.ctx.fillStyle = '#00ffff';
                        this.ctx.beginPath();
                        this.ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
                        this.ctx.fill();
                        
                        // Label
                        this.ctx.fillStyle = 'rgba(0,255,255,0.9)';
                        this.ctx.font = 'bold 12px Orbitron';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(keypoint.part[0], pos.x, pos.y - 20);
                    }
                });

                // Draw skeleton with glow lines
                this.drawSkeleton(pose.keypoints);

                this.ctx.restore();
            }

            drawSkeleton(keypoints) {
                const adjacentKeyPoints = [
                    [0, 1], [0, 2], [1, 3], [2, 4], [0, 5], [5, 6],
                    [5, 11], [6, 12], [11, 12], [5, 7], [7, 9],
                    [6, 8], [8, 10], [11, 13], [13, 15], [12, 14], [14, 16]
                ];

                keypoints.forEach((keypoint1, i) => {
                    adjacentKeyPoints.forEach(([i1, i2]) => {
                        if (i === i1 || i === i2) {
                            const keypoint2 = keypoints[i2 === i ? i1 : i2];
                            if (keypoint1.score > 0.3 && keypoint2.score > 0.3) {
                                const p1 = this.scaleToCanvas(keypoint1.position);
                                const p2 = this.scaleToCanvas(keypoint2.position);
                                
                                // Line glow
                                this.ctx.lineWidth = 8;
                                this.ctx.strokeStyle = `rgba(255,255,255,${Math.min(keypoint1.score, keypoint2.score) * 0.6})`;
                                this.ctx.lineCap = 'round';
                                this.ctx.shadowBlur = 20;
                                this.ctx.shadowColor = '#00ffff';
                                this.ctx.beginPath();
                                this.ctx.moveTo(p1.x, p1.y);
                                this.ctx.lineTo(p2.x, p2.y);
                                this.ctx.stroke();
                                this.ctx.shadowBlur = 0;
                            }
                        }
                    });
                });
            }

            scaleToCanvas(point) {
                const scaleX = this.canvas.width;
                const scaleY = this.canvas.height;
                return { x: point.x * scaleX, y: point.y * scaleY };
            }

            updateStats(pose) {
                const visibleKeypoints = pose.keypoints.filter(kp => kp.score > 0.5).length;
                const confidence = Math.max(...pose.keypoints.map(kp => kp.score));
                
                document.getElementById('confidenceFill').style.width = `${confidence * 100}%`;
                document.getElementById('confidenceText').textContent = `${Math.round(confidence * 100)}%`;
                document.getElementById('keypointCount').textContent = visibleKeypoints;
            }

            toggleFullscreen() {
                const container = document.getElementById('container');
                if (!document.fullscreenElement) {
                    container.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            }
        }

        // Initialize when page loads
        window.addEventListener('load', () => new PoseDetector());
    </script>
</body>
</html>
