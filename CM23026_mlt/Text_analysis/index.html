<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Sentiment Analysis - RNN</title>
    
    <!-- TensorFlow.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #11998e;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.4);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .result.positive {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        
        .result.negative {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        
        .result h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .result.positive h2 {
            color: #28a745;
        }
        
        .result.negative h2 {
            color: #dc3545;
        }
        
        .confidence {
            font-size: 18px;
            color: #333;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-size: 16px;
        }
        
        .training-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .training-info h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .training-info p {
            color: #666;
            margin-bottom: 5px;
        }
        
        .progress {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            transition: width 0.3s;
        }
        
        .sample-texts {
            margin-top: 20px;
        }
        
        .sample-texts h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .sample-btn {
            padding: 8px 15px;
            margin: 5px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        
        .sample-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Text Sentiment Analysis</h1>
        <p class="subtitle">Using RNN with TensorFlow.js</p>
        
        <div class="input-group">
            <label for="textInput">Enter Text to Analyze:</label>
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        </div>
        
        <button class="btn" id="analyzeBtn" onclick="analyzeSentiment()">Analyze Sentiment</button>
        
        <div class="sample-texts">
            <h3>Try these examples:</h3>
            <button class="sample-btn" onclick="setSample('positive')">"I love this product! It's amazing!"</button>
            <button class="sample-btn" onclick="setSample('negative')">"This is terrible. I hate it."</button>
        </div>
        
        <div id="loading" class="loading">Training RNN model... please wait...</div>
        
        <div class="training-info" id="trainingInfo" style="display: none;">
            <h3>📊 Training Progress</h3>
            <p id="epochInfo">Epoch: 0/10</p>
            <p id="lossInfo">Loss: -</p>
            <div class="progress">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
        </div>
        
        <div id="result" class="result">
            <h2 id="sentimentLabel"></h2>
            <p class="confidence" id="confidenceLabel"></p>
        </div>
    </div>

    <script>
        // Vocabulary for text processing (common English words)
        const VOCAB_SIZE = 10000;
        const MAX_LENGTH = 100;
        const EMBEDDING_DIM = 64;
        
        let model = null;
        let vocab = {};
        let isModelReady = false;

        // Simple word tokenization
        function tokenize(text) {
            return text.toLowerCase()
                .replace(/[^\w\s]/g, ' ')
                .split(/\s+/)
                .filter(word => word.length > 0);
        }

        // Build vocabulary from text
        function buildVocab(texts) {
            const wordCounts = {};
            
            texts.forEach(text => {
                const words = tokenize(text);
                words.forEach(word => {
                    wordCounts[word] = (wordCounts[word] || 0) + 1;
                });
            });
            
            // Sort by frequency and take top words
            const sortedWords = Object.entries(wordCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, VOCAB_SIZE - 2)  // Reserve 0 for padding, 1 for unknown
                .map(entry => entry[0]);
            
            // Create vocab mapping
            const vocabMap = { '<PAD>': 0, '<UNK>': 1 };
            sortedWords.forEach((word, index) => {
                vocabMap[word] = index + 2;
            });
            
            return vocabMap;
        }

        // Convert text to sequence
        function textToSequence(text) {
            const words = tokenize(text);
            const sequence = words.map(word => vocab[word] || vocab['<UNK>']);
            
            // Pad or truncate to fixed length
            if (sequence.length > MAX_LENGTH) {
                return sequence.slice(0, MAX_LENGTH);
            }
            
            // Pad with zeros
            while (sequence.length < MAX_LENGTH) {
                sequence.push(0);
            }
            
            return sequence;
        }

        // Create RNN model for sentiment analysis
        function createModel() {
            const rnnModel = tf.sequential();
            
            // Embedding layer
            rnnModel.add(tf.layers.embedding({
                inputDim: VOCAB_SIZE,
                outputDim: EMBEDDING_DIM,
                inputLength: MAX_LENGTH
            }));
            
            // LSTM layer (RNN variant)
            rnnModel.add(tf.layers.lstm({
                units: 32,
                returnSequences: false,
                dropout: 0.2
            }));
            
            // Dense layers
            rnnModel.add(tf.layers.dense({
                units: 16,
                activation: 'relu'
            }));
            
            rnnModel.add(tf.layers.dropout(0.3));
            
            // Output layer (sigmoid for binary classification)
            rnnModel.add(tf.layers.dense({
                units: 1,
                activation: 'sigmoid'
            }));
            
            rnnModel.compile({
                optimizer: tf.train.adam(0.001),
                loss: 'binaryCrossentropy',
                metrics: ['accuracy']
            });
            
            return rnnModel;
        }

        // Generate synthetic training data
        function generateTrainingData() {
            // Positive sample texts
            const positiveTexts = [
                "I love this product amazing wonderful",
                "Great excellent fantastic best ever",
                "Happy wonderful beautiful love it",
                "Perfect awesome incredible recommend",
                "Good nice super love this",
                "Excellent amazing wonderful perfect",
                "Best product ever quality great",
                "Love it so much happy",
                "Wonderful experience highly recommend",
                "Amazing product great quality"
            ];
            
            // Negative sample texts
            const negativeTexts = [
                "Terrible awful horrible worst hate",
                "Bad poor quality waste money",
                "Disappointing terrible not recommend",
                "Horrible awful terrible dislike",
                "Worst product ever broken hate",
                "Poor quality terrible experience",
                "Awful horrible not worth it",
                "Bad terrible waste of time",
                "Horrible product disappointed hate",
                "Terrible awful not good at all"
            ];
            
            // Build vocabulary from all texts
            const allTexts = [...positiveTexts, ...negativeTexts];
            vocab = buildVocab(allTexts);
            
            // Create training data
            const xs = [];
            const ys = [];
            
            positiveTexts.forEach(text => {
                xs.push(textToSequence(text));
                ys.push([1]);  // Positive label
            });
            
            negativeTexts.forEach(text => {
                xs.push(textToSequence(text));
                ys.push([0]);  // Negative label
            });
            
            // Add some variations by shuffling and duplicating
            for (let i = 0; i < 50; i++) {
                const posText = positiveTexts[i % positiveTexts.length];
                const negText = negativeTexts[i % negativeTexts.length];
                
                // Add noise variations
                xs.push(textToSequence(posText + " really good"));
                ys.push([1]);
                
                xs.push(textToSequence(negText + " really bad"));
                ys.push([0]);
            }
            
            return {
                xs: tf.tensor2d(xs, [xs.length, MAX_LENGTH]),
                ys: tf.tensor2d(ys, [ys.length, 1])
            };
        }

        // Train the model
        async function trainModel() {
            console.log("Generating training data...");
            const { xs, ys } = generateTrainingData();
            
            console.log("Creating RNN model...");
            model = createModel();
            
            document.getElementById('trainingInfo').style.display = 'block';
            
            console.log("Training started...");
            
            await model.fit(xs, ys, {
                epochs: 10,
                batchSize: 8,
                validationSplit: 0.2,
                callbacks: {
                    onEpochEnd: async (epoch, logs) => {
                        const progress = ((epoch + 1) / 10) * 100;
                        document.getElementById('epochInfo').innerText = `Epoch: ${epoch + 1}/10`;
                        document.getElementById('lossInfo').innerText = `Loss: ${logs.loss.toFixed(4)} | Accuracy: ${(logs.acc * 100).toFixed(2)}%`;
                        document.getElementById('progressBar').style.width = `${progress}%`;
                        
                        console.log(`Epoch ${epoch + 1}: loss = ${logs.loss}, acc = ${logs.acc}`);
                        
                        // Allow UI to update
                        await tf.nextFrame();
                    }
                }
            });
            
            // Clean up tensors
            xs.dispose();
            ys.dispose();
            
            isModelReady = true;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = false;
            console.log("Model training completed!");
        }

        // Set sample text
        function setSample(type) {
            const textArea = document.getElementById('textInput');
            if (type === 'positive') {
                textArea.value = "I love this product! It's amazing!";
            } else {
                textArea.value = "This is terrible. I hate it.";
            }
        }

        // Analyze sentiment
        async function analyzeSentiment() {
            const text = document.getElementById('textInput').value.trim();
            
            if (!text) {
                alert("Please enter some text to analyze.");
                return;
            }

            if (!isModelReady) {
                alert("Model is still training. Please wait.");
                return;
            }

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerText = "Analyzing...";

            try {
                console.log("Analyzing text:", text);
                
                // Convert text to tensor
                const sequence = textToSequence(text);
                const inputTensor = tf.tensor2d([sequence], [1, MAX_LENGTH]);
                
                // Get prediction
                const prediction = model.predict(inputTensor);
                const score = (await prediction.data())[0];
                
                // Clean up
                inputTensor.dispose();
                prediction.dispose();
                
                console.log("Prediction score:", score);
                
                const resultDiv = document.getElementById('result');
                const sentimentLabel = document.getElementById('sentimentLabel');
                const confidenceLabel = document.getElementById('confidenceLabel');
                
                // Remove previous classes
                resultDiv.classList.remove('positive', 'negative');
                
                if (score >= 0.5) {
                    resultDiv.classList.add('positive');
                    sentimentLabel.innerText = "✅ Positive";
                    confidenceLabel.innerText = `Confidence: ${(score * 100).toFixed(2)}%`;
                } else {
                    resultDiv.classList.add('negative');
                    sentimentLabel.innerText = "❌ Negative";
                    confidenceLabel.innerText = `Confidence: ${((1 - score) * 100).toFixed(2)}%`;
                }
                
                resultDiv.style.display = 'block';
                
            } catch (error) {
                console.error("Error analyzing sentiment:", error);
                alert("Error analyzing text. Please try again.");
            }

            btn.disabled = false;
            btn.innerText = "Analyze Sentiment";
        }

        // Initialize on page load
        document.getElementById('analyzeBtn').disabled = true;
        
        // Start training
        trainModel();
    </script>
</body>
</html>
