<!DOCTYPE html>
<html>
<head>
  <title>Webcam Object Classification</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>
  <h2>Webcam Classification (MobileNet)</h2>
  <video id="webcam" autoplay playsinline width="400" height="300"></video>
  <p id="result">Loading model...</p>

  <script>
    const video = document.getElementById("webcam");
    const result = document.getElementById("result");

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      return new Promise(resolve => {
        video.onloadedmetadata = () => resolve(video);
      });
    }

    async function run() {
      await setupCamera();
      const model = await mobilenet.load();

      while (true) {
        const predictions = await model.classify(video);
        result.innerText = predictions[0].className + 
                           " (" + (predictions[0].probability * 100).toFixed(2) + "%)";
        await tf.nextFrame();
      }
    }

    run();
  </script>
</body>
</html>
